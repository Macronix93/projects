<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="weatherapp.js"></script>
    <title>Wetter App</title>
</head>

<body>
    <div class="bg">
        <div id="title">Weather App</div>
        <div class="container">
            <div id="content">
                <div id="searchbar">
                    <label for="city"></label><input type="text" id="city" name="city" oninput="processChange()" placeholder="Search...">
                    <button id="refreshbutton" onclick="fetchData()"></button>
                </div>
                <div id="citydata">
                    <div id="namedate">
                        <div id="cityname"></div>
                        <div id="date"></div>
                    </div><br>
                    <div id="temp"></div>
                    <div id="weatherinfo">
                        <img src="" id="weathericon" alt=""><br>
                        <div id="weathertext"></div>
                    </div>
                    <div id="minmaxtemp"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
